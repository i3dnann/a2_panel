[build]
  command = "npm run build --workspace @a2-panel/frontend"
  publish = "frontend/dist"

[[redirects]]
  from = "/api/*"
  to = "http://31.57.97.59:3001/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "http://31.57.97.59:3001/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
